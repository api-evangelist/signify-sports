aid: signify-sports
name: Signify Group
description: >-
  Signify Group is a London, United Kingdom-based ethical data science firm
  founded in 2017 by co-founder and CEO Jonathan Hirshler, applying machine
  learning, natural language understanding, and open-source intelligence
  (OSINT) to social and digital media data. Its flagship service, Threat
  Matrix, is widely regarded as the leading platform for detecting,
  analysing, evidencing, and actioning online abuse and fixated threats
  directed at athletes, clubs, leagues, player unions, federations, brands,
  and other public figures. Threat Matrix scans incoming public messages
  across X (Twitter), Instagram, Facebook, and TikTok in 39+ languages,
  uses "augmented intelligence" (AI speed combined with trained human
  analyst nuance) to triage racist, sexist, homophobic, anti-semitic,
  islamophobic, gambling-driven, and personally targeted abuse, and
  produces evidence-grade reports with network mapping that can be used
  by platforms, police, sponsors, and protection teams. Customers and
  partners include the Professional Footballers' Association (PFA),
  Kick It Out, the International Tennis Federation (ITF) and WTA Tour
  covering c.8,300 players, the International Ski and Snowboard Federation
  (FIS) protecting 1,000+ athletes and officials, the Badminton World
  Federation (BWF), the NCAA, and Japan's 2026 World Baseball Classic
  squad. Signify also operates ShareScore (media coverage and social
  buzz analytics), Sports Insights (fan engagement and athlete insight
  analytics), and Online Forensics (brand reputation, OSINT
  investigations, and risk assurance). Signify is a private services
  firm with no public developer API, no public SDKs, and no public
  GitHub organization; engagement is via direct sales and managed
  service contracts with rights-holders, leagues, federations, and
  enterprise clients.
